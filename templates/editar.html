{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="d-flex align-items-center mb-4">
            <h2 class="text-dark"> Editar Producto</h2>
        </div>

        <form method="POST" class="needs-validation">
            <div class="row">
                <div class="col-md-12 mb-3">
                    <label class="form-label fw-bold text-dark">Nombre del Producto:</label>
                    <input type="text" name="nombre" class="form-control form-control-lg"
                        value="{{ producto['nombre'] }}" required>
                </div>

                <div class="col-md-12 mb-3">
                    <label class="form-label fw-bold text-dark">Categoría:</label>
                    <select name="categoria" class="form-select">
                        <option value="Laptops" {% if producto['categoria']=='Laptops' %}selected{% endif %}>Laptops
                        </option>
                        <option value="Celulares" {% if producto['categoria']=='Celulares' %}selected{% endif %}>
                            Celulares</option>
                        <option value="Accesorios" {% if producto['categoria']=='Accesorios' %}selected{% endif %}>
                            Accesorios</option>
                        <option value="Otros" {% if producto['categoria']=='Otros' %}selected{% endif %}>Otros</option>
                    </select>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold text-dark">Precio (Bs):</label>
                    <div class="input-group">
                        <span class="input-group-text">Bs</span>
                        <input type="number" step="0.01" name="precio" class="form-control"
                            value="{{ producto['precio'] }}" required>
                    </div>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold text-dark">Stock disponible:</label>
                    <input type="number" name="stock" class="form-control" value="{{ producto['stock'] }}" required>
                </div>
            </div>

            <hr class="my-4">

            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                <a href="/" class="btn btn-outline-secondary px-4">Cancelar</a>
                <button type="submit" class="btn btn-primary px-5 fw-bold">Actualizar Cambios</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
