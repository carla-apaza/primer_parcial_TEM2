{% extends 'base.html' %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Listado de Productos</h2>
    <a href="/registrar" class="btn btn-primary">+ Nuevo Producto</a>
</div>

<div class="card shadow">
    <div class="card-body">
        <table class="table table-striped table-hover mt-3">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Producto</th>
                    <th>Categoría</th>
                    <th>Precio</th>
                    <th>Stock</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody class="fw-medium text-dark">
                {% for p in productos %}
                <tr>
                    <td>{{ p.id }}</td>
                    <td><strong>{{ p.nombre }}</strong></td>
                    <td><span class="badge bg-info text-dark">{{ p.categoria }}</span></td>
                    <td>${{ p.precio }}</td>
                    <td>
                        <span class="{% if p.stock < 5 %}text-danger fw-bold{% endif %}">
                            {{ p.stock }} unidades
                        </span>
                    </td>
                    <td>
                        <a href="/editar/{{ p.id }}" class="btn btn-sm btn-warning">Editar</a>
                        <a href="/eliminar/{{ p.id }}" class="btn btn-sm btn-danger"
                            onclick="return confirm('¿Seguro?')">Eliminar</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
