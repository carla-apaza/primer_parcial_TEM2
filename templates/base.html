<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda Tecnologica - Inventario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            /* REEMPLAZA ESTA URL POR TU GIF */
            background-image: url('/static/fondo.gif');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
        }

        /* Contenedor principal con fondo claro semitransparente */
        .glass-container {
            background-color: rgba(255, 255, 255, 0.9);
            /* Fondo blanco casi sólido */
            border-radius: 15px;
            padding: 30px;
            margin-top: 50px;
            margin-bottom: 50px;
            box-shadow: 0 8px 32px 0 rgba(0, 255, 204, 0.37);
            border: 1px solid rgb(241, 235, 235);
        }

        .navbar {
            background-color: rgba(112, 173, 235, 0.95) !important;
            color: white;
        }

        .nav-link {
            color: white !important;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark shadow">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">💻 TechStore</a>
            <div class="navbar-nav">
                <a class="nav-link" href="/">Inventario</a>
                <a class="nav-link" href="/registrar">Registrar Producto</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-10 glass-container">
                {% block content %}{% endblock %}
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
